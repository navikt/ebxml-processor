apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: "cpa-repo"
  namespace: "team-emottak"
  labels:
    "team": "team-emottak"
spec:
  azure:
    application:
      enabled: true
  image: {{image}}
  liveness:
    path: "/internal/health/liveness"
    port: 8080
    initialDelay: 30
    timeout: 10
    failureThreshold: 10
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
      destinations:
        - id: "grafana-lgtm"
        - id: "elastic-apm"
    logging:
      destinations:
        - id: elastic
        - id: loki
  readiness:
    path: "/internal/health/readiness"
    port: 8080
    initialDelay: 30
    timeout: 10
    failureThreshold: 10
  prometheus:
    enabled: true
    path: /prometheus
  replicas:
    scalingStrategy:
      cpu:
        thresholdPercentage: 35
    min: 2
    max: 4
  resources:
    limits:
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "512Mi"
  ingresses:
    - "https://cpa-repo-fss.intern.nav.no"
    #- "https://cpa-repo.prod-fss-pub.nais.io"
  vault:
    enabled: true
    paths:
      - kvPath: /oracle/data/prod/creds/emottak-nmp5
        mountPath: /secrets/oracle/creds
      - kvPath: /oracle/data/prod/config/emottak
        mountPath: /secrets/oracle/config
  kafka:
    pool: nav-prod
  webproxy: true
  accessPolicy:
    inbound:
      rules:
        - application: cpa-sync
        - application: ebms-provider
        - application: ebms-async
        - application: ebms-payload
        - application: emottak-monitor
    outbound:
      external:
        - host: crl.buypassca.com
          ports:
            - port: 80
        - host: crl.buypass.no
          ports:
            - port: 80
        - host: crl.commfides.com
        - host: crl1.commfides.com
          ports:
            - port: 80
  env:
    - name: VAULT_JDBC_URL
      value: jdbc:postgresql://A01DBVL037.adeo.no:5432/
    - name: TRUSTSTORE_PATH
      value: truststore_prod.p12
    - name: MAX_CONNECTION_POOL_SIZE_FOR_USER
      value: "10"
    - name: MAX_CONNECTION_POOL_SIZE_FOR_ADMIN
      value: "2"
    - name: ORACLE_CREDENTIAL_SECRET_PATH
      value: /secrets/oracle/creds
    - name: ORACLE_CONFIG_SECRET_PATH
      value: /secrets/oracle/config
    - name: ADRESSE_REGISTER_URL
      value: https://cpapi.grunndata.nhn.no/api/v1/communicationparty
    - name: ADRESSE_REGISTER_CERTIFICATE_URL
      value: https://cpapi.grunndata.nhn.no/api/v1/certificate
    - name: NHN_KEYPAIR_PATH
      value: "/var/run/secrets/emottak-ar-klient-secret/key"
    - name: NHN_TOKEN_ENDPOINT
      value: "https://helseid-sts.nhn.no/connect/token"
    - name: NHN_CLIENT_KEY_ID
      value: "placeholderKeyId"
    - name: NHN_CLIENT_ID
      value: "placeholderClientId"
    - name: NHN_CLIENT_AUDIENCE
      value: "https://helseid-sts.nhn.no"
    - name: NHN_CLIENT_SCOPE
      value: "nhn:communicationparty/read"
    - name: NHN_CLIENT_GRANT_TYPE
      value: "client_credentials"
    - name: NHN_CLIENT_ASSERTION_TYPE
      value: "urn:ietf:params:oauth:client-assertion-type:jwt-bearer"
